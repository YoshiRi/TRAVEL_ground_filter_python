name: Build web assets

# Rebuild the wheel and update docs/ whenever the Python source or
# packaging config changes on main.
on:
  push:
    branches: [main]
    paths:
      - "src/travel_py/**"
      - "pyproject.toml"
      - "tools/build_web.py"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated docs/ files

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Build wheel and update docs/
        run: uv run python tools/build_web.py

      - name: Commit updated wheel and manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild wheel for GitHub Pages [skip ci]"
          file_pattern: "docs/travel_py-*.whl docs/wheel_info.json"
